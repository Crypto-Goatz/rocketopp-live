name: Deploy to Vercel (zero build minutes)

# Build runs entirely on GitHub Actions runners. Vercel only hosts the
# pre-built artifacts (vercel deploy --prebuilt), so Vercel build minutes
# are NOT consumed. Required GitHub repo secrets:
#
#   VERCEL_TOKEN       account-wide deploy token (cQHHaQso… per memory)
#   VERCEL_ORG_ID      team_VtbfSzhDgB6OwglLfuPDFcd2
#   VERCEL_PROJECT_ID  prj_mvm6E3ZKYY82w97r8wiFNG6hLR0u (rocketopp-live)
#
# `vercel pull` downloads project env vars + project metadata into .vercel/
# so the build has the same env Vercel would have used. `vercel build`
# produces .vercel/output (Build Output API). `vercel deploy --prebuilt`
# uploads only that output — Vercel skips the build, no minutes consumed.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-prod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project config + env
        run: |
          vercel pull --yes \
            --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build with Vercel CLI
        run: |
          vercel build --prod \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy pre-built artifacts to Vercel
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod \
            --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $DEPLOY_URL"

      - name: Summary
        run: |
          echo "### ✅ Deployed (zero Vercel build minutes used)" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
